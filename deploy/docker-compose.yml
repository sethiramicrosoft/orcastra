services:
  orcastra:
    build:
      context: ..
      dockerfile: Dockerfile
    image: sethiramicrosoft/orcastra:local
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - orcastra_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgres://orcastra:${POSTGRES_PASSWORD}@postgres:5432/orcastra?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ENCRYPTION_KEY_B64=${ENCRYPTION_KEY_B64}
      - ENCRYPTION_KEY_ID=${ENCRYPTION_KEY_ID}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL}
      - JWT_ISSUER=orcastra
      - JWT_TTL=24h
      - CADDY_ADMIN_API=http://caddy:2019
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orcastra_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=orcastra
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=orcastra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orcastra"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orcastra_net

  caddy:
    image: caddy:2-alpine
    command: ["caddy", "run", "--config", "/etc/caddy/caddy.json"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy.bootstrap.json:/etc/caddy/caddy.json:ro
    networks:
      - orcastra_net

volumes:
  orcastra_data:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  orcastra_net:
    driver: bridge
